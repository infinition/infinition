<svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Filtre CRT (flicker et distorsion) -->
    <filter id="crt">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="1" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.5" />
    </filter>

    <!-- Motif de scanlines horizontales -->
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="800" height="4">
      <line x1="0" y1="0" x2="800" y2="0" stroke="rgba(0,0,0,0.4)" stroke-width="2" />
    </pattern>
  </defs>

  <!-- Fond sombre -->
  <rect width="100%" height="100%" fill="#1a1a1d" />

  <!-- Appliquer les scanlines -->
  <rect width="100%" height="100%" fill="url(#scanlines)" />

  <!-- Cadre et Contenu de la Console (avec effet CRT) -->
  <g filter="url(#crt)">
    <!-- Bordure verte néon -->
    <rect x="25" y="25" width="750" height="550" rx="10" ry="10" stroke="#0f0" stroke-width="4" fill="none" />

    <!-- En-tête de la Console -->
    <text x="50" y="70" font-family="'Courier New', monospace" font-size="28" fill="#f0f" font-weight="bold">
      SYSTEM_UPLINK // ID: 0xid
    </text>
    <text x="50" y="100" font-family="'Courier New', monospace" font-size="18" fill="#0f0">
      HACKER | ML RESEARCHER | BLADER | 3D ARTIST
    </text>

    <!-- Zone de texte principal -->
    <g transform="translate(50, 150)" font-family="'Courier New', monospace" font-size="16" fill="#0f0">
      <text x="0" y="0">_> access --bjorn --stealth-mode</text>
      <text x="0" y="30">[READY] Loading immersive_worlds.obj...</text>
      <text x="0" y="60">...</text>
      <text x="0" y="90">[SUCCESS] Connection established.</text>
      
      <!-- Lignes de statut simulées -->
      <text x="0" y="130">>_ UPLINK: OK</text>
      <text x="150" y="130">>_ ENCRYPTION: AES-256</text>
      <text x="0" y="160">>_ PING: 23ms</text>
      <text x="150" y="160">>_ TARGET: null</text>
    </g>

    <!-- Texte en bas -->
    <text x="50" y="550" font-family="'Courier New', monospace" font-size="12" fill="#0f0" opacity="0.7">
      "FROM THE ABYSS TO THE QUANTUM REALM" - 2024 VERSION
    </text>

    <!-- Le curseur clignotant (animation SVG native) -->
    <rect x="50" y="500" width="15" height="25" fill="#0f0">
      <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>
